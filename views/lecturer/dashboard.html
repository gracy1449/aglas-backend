<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoGrader • Lecturer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .sidebar { background: linear-gradient(180deg, #581c87 0%, #3b0764 100%); }
    .nav-item.active { background: rgba(255,255,255,0.15); }
    .nav-item:hover { background: rgba(255,255,255,0.1); cursor: pointer; }
 /* Mobile Responsive */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: -256px;
    top: 0;
    bottom: 0;
    z-index: 50;
    transition: left 0.3s ease;
    width: 256px !important;
  }
  .sidebar.open {
    left: 0;
  }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 40;
  }
  .sidebar-overlay.show {
    display: block;
  }
  .flex.h-screen { display: block; }
  .flex-1.overflow-auto { height: 100vh; }
}
 </style>
</head>
<body class="bg-gray-50">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <div class="sidebar w-64 text-white flex flex-col flex-shrink-0">
    <div class="px-6 pt-8 pb-6 border-b border-purple-800">
      <div class="flex items-center gap-3">
        <i class="fas fa-graduation-cap text-3xl"></i>
        <div>
          <h1 class="text-xl font-bold">AGLAS</h1>
          <p class="text-purple-200 text-xs">Lecturer Panel</p>
        </div>
      </div>
    </div>
    <div class="mb-6 px-3 flex flex-col items-center text-center">

  <!-- Clickable Avatar -->
  <div class="relative mb-3 cursor-pointer group" onclick="document.getElementById('photoInput').click()">
    <div class="w-14 h-14 rounded-full bg-white/20 flex items-center justify-center text-xl font-bold ring-2 ring-purple-400 overflow-hidden" id="sidebarAvatar">L</div>
    <div class="absolute inset-0 rounded-full bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
      <i class="fas fa-camera text-white text-sm"></i>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="photoInput" accept="image/jpeg,image/png,image/webp"
    class="hidden" onchange="uploadPhoto(this)"/>

  <p class="font-semibold text-sm" id="lecturerName">Lecturer</p>
  <p class="text-purple-300 text-xs">Lecturer</p>
  <p class="text-purple-200 text-xs mt-1" id="sidebarStaff" style="display:none;">
    <span class="bg-white/10 px-2 py-1 rounded-full" id="sidebarStaffText"></span>
  </p>

      <nav class="space-y-1">
        <div onclick="showPage('dashboard', this)" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-home w-4"></i><span class="text-sm font-medium">Dashboard</span>
        </div>
        <div onclick="showPage('courses', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-book w-4"></i><span class="text-sm font-medium">My Courses</span>
        </div>
        <div onclick="showPage('assessments', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-file-alt w-4"></i><span class="text-sm font-medium">Assessments</span>
        </div>
        <div onclick="showPage('submissions', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-inbox w-4"></i><span class="text-sm font-medium">Submissions</span>
        </div>
        <div onclick="showPage('results', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-trophy w-4"></i><span class="text-sm font-medium">Results</span>
        </div>
        <div onclick="showPage('students', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-users w-4"></i><span class="text-sm font-medium">My Students</span>
        </div>
        <div onclick="showPage('settings', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-cog w-4"></i><span class="text-sm font-medium">Settings</span>
        </div>
      </nav>
    </div>
    <div class="p-4 border-t border-purple-800">
      <button onclick="logout()" class="w-full flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 py-3 rounded-2xl text-white text-sm font-medium transition-all">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="flex-1 overflow-auto">
   <header class="bg-white border-b px-4 md:px-8 py-4 flex items-center justify-between sticky top-0 z-10">
  <div class="flex items-center gap-3">
    <button onclick="toggleSidebar()"
      class="md:hidden w-9 h-9 flex items-center justify-center rounded-xl bg-gray-100 hover:bg-gray-200">
      <i class="fas fa-bars text-gray-600"></i>
    </button>
    <h1 id="pageTitle" class="text-xl md:text-2xl font-bold text-gray-900">Dashboard</h1>
  </div>
  <div class="flex items-center gap-3">
    <div class="hidden md:flex items-center bg-green-100 text-green-700 px-4 py-2 rounded-full text-xs font-medium">
      <div class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></div>
      System Online
    </div>
    <div class="flex items-center gap-3">
      <div class="text-right hidden md:block">
        <p class="font-semibold text-gray-800 text-sm" id="headerName"></p>
        <p class="text-xs text-gray-500">Lecturer</p>
      </div>
      <div class="w-9 h-9 bg-purple-100 text-purple-700 rounded-xl flex items-center justify-center font-bold" id="headerAvatar">L</div>
    </div>
  </div>
</header>
    <div class="p-8" id="mainContent"></div>
  </div>
</div>

<script>
  function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  }

  // Close sidebar when nav item clicked on mobile
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        if (window.innerWidth < 768) {
          document.querySelector('.sidebar').classList.remove('open');
          document.getElementById('sidebarOverlay').classList.remove('show');
        }
      });
    });
  });
  let currentUser = {};
  let questionCount = 0;

  // Load user info on page load
  fetch('/auth/me').then(r => r.json()).then(data => {
    if (!data.fullName) { window.location.href = '/auth/login'; return; }
    currentUser = data;
    const initial = data.surname ? data.surname.charAt(0).toUpperCase() : data.fullName.charAt(0).toUpperCase();
    const displayName = data.surname ? `${data.surname.toUpperCase()} ${data.firstName}` : data.fullName;
    document.getElementById('lecturerName').textContent = displayName;
    document.getElementById('headerName').textContent = displayName;
    document.getElementById('sidebarAvatar').textContent = initial;
    // Load profile photo if exists
if (data.profilePhoto) {
  setAvatarPhoto(data.profilePhoto);
} else {
  document.getElementById('sidebarAvatar').textContent = initial;
}
    document.getElementById('headerAvatar').textContent = initial;
    if (data.staffNumber) {
      document.getElementById('sidebarStaff').style.display = 'block';
      document.getElementById('sidebarStaffText').textContent = data.staffNumber;
    }
    loadDashboard();
  }).catch(() => { window.location.href = '/auth/login'; });

  function showPage(page, el) {
    document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('pageTitle').textContent =
      page === 'dashboard' ? 'Dashboard' :
      page === 'courses' ? 'My Courses' :
      page === 'assessments' ? 'Assessments' :
      page === 'submissions' ? 'Submissions' :
      page === 'results' ? 'Results' :
      page === 'students' ? 'My Students' : 'Settings';
    if (page === 'dashboard') loadDashboard();
    else if (page === 'courses') loadCourses();
    else if (page === 'assessments') loadAssessments();
    else if (page === 'submissions') loadSubmissions();
    else if (page === 'results') loadLecturerResults();
    else if (page === 'students') loadMyStudents();
    else if (page === 'settings') loadSettings();
  }

  function getGreeting() {
    const hour = new Date().getHours();
    if (hour < 12) return 'Good morning';
    if (hour < 17) return 'Good afternoon';
    return 'Good evening';
  }

  function loadDashboard() {
    const firstName = currentUser.fullName ? currentUser.fullName.split(' ')[0] : 'Lecturer';
    document.getElementById('mainContent').innerHTML = `

      <!-- Welcome Banner -->
      <div class="bg-gradient-to-r from-purple-700 to-purple-900 rounded-2xl p-8 mb-8 text-white relative overflow-hidden">
        <div class="absolute right-0 top-0 w-64 h-full opacity-10">
          <i class="fas fa-chalkboard-teacher text-9xl absolute right-8 top-6"></i>
        </div>
        <p class="text-purple-200 text-sm mb-1">${getGreeting()},</p>
        <h2 class="text-3xl font-bold mb-2">Welcome back, ${firstName}! </h2>
        ${currentUser.staffNumber ? `<p class="text-purple-300 text-xs mb-2">Staff No: <span class="font-bold text-white">${currentUser.staffNumber}</span></p>` : ''}
       <p class="text-purple-200 text-sm mb-2">Here's what's happening with your courses today.</p>
        ${currentUser.lastLogin ? `
        <p class="text-purple-300 text-xs mb-6">
          <i class="fas fa-clock mr-1"></i>
          Last login: ${new Date(currentUser.lastLogin).toLocaleString('en-GB', {
            weekday: 'short', year: 'numeric', month: 'short',
            day: 'numeric', hour: '2-digit', minute: '2-digit'
          })}
        </p>` : '<p class="mb-6"></p>'}
        <div class="flex gap-3">
          <button onclick="showPage('assessments', document.querySelectorAll('.nav-item')[2])"
            class="bg-white text-purple-700 px-5 py-2 rounded-xl text-sm font-bold hover:bg-purple-50 transition-all">
            <i class="fas fa-plus mr-2"></i>New Assessment
          </button>
          <button onclick="showPage('submissions', document.querySelectorAll('.nav-item')[3])"
            class="bg-white/20 hover:bg-white/30 text-white px-5 py-2 rounded-xl text-sm font-bold transition-all">
            <i class="fas fa-inbox mr-2"></i>View Submissions
          </button>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center mb-4"><i class="fas fa-book text-purple-600"></i></div>
          <p id="statCourses" class="text-3xl font-bold text-gray-900">—</p>
          <p class="text-sm text-gray-500 mt-1">My Courses</p>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center mb-4"><i class="fas fa-file-alt text-blue-600"></i></div>
          <p id="statAssessments" class="text-3xl font-bold text-gray-900">—</p>
          <p class="text-sm text-gray-500 mt-1">Assessments</p>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center mb-4"><i class="fas fa-inbox text-green-600"></i></div>
          <p id="statSubmissions" class="text-3xl font-bold text-gray-900">—</p>
          <p class="text-sm text-gray-500 mt-1">Submissions</p>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <div class="w-10 h-10 bg-pink-100 rounded-xl flex items-center justify-center mb-4"><i class="fas fa-check-circle text-pink-600"></i></div>
          <p id="statGraded" class="text-3xl font-bold text-gray-900">—</p>
          <p class="text-sm text-gray-500 mt-1">Graded</p>
        </div>
      </div>

      <!-- Bottom Grid -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold text-gray-900 mb-4">My Courses</h2>
          <div id="dashCourses" class="space-y-3"><div class="text-gray-400 text-sm">Loading...</div></div>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold text-gray-900 mb-4"> Submission Overview</h2>
          <canvas id="submissionsChart" height="200"></canvas>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold text-gray-900 mb-4">Quick Actions</h2>
          <div class="space-y-3">
            <button onclick="showPage('assessments', document.querySelectorAll('.nav-item')[2])" class="w-full flex items-center gap-3 p-4 bg-purple-50 hover:bg-purple-100 rounded-xl transition-all text-left">
              <i class="fas fa-plus-circle text-purple-600"></i>
              <div><p class="font-semibold text-sm text-gray-800">Create Assessment</p><p class="text-xs text-gray-500">Add objective, theory or programming test</p></div>
            </button>
            <button onclick="showPage('submissions', document.querySelectorAll('.nav-item')[3])" class="w-full flex items-center gap-3 p-4 bg-blue-50 hover:bg-blue-100 rounded-xl transition-all text-left">
              <i class="fas fa-inbox text-blue-600"></i>
              <div><p class="font-semibold text-sm text-gray-800">View Submissions</p><p class="text-xs text-gray-500">See student submissions and grades</p></div>
            </button>
            <button onclick="showPage('courses', document.querySelectorAll('.nav-item')[1])" class="w-full flex items-center gap-3 p-4 bg-green-50 hover:bg-green-100 rounded-xl transition-all text-left">
              <i class="fas fa-book text-green-600"></i>
              <div><p class="font-semibold text-sm text-gray-800">My Courses</p><p class="text-xs text-gray-500">View all your assigned courses</p></div>
            </button>
          </div>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold text-gray-900 mb-4"> Assessment Types</h2>
          <canvas id="assessmentTypesChart" height="200"></canvas>
        </div>
      </div>`;

    fetch('/lecturer/stats').then(r => r.json()).then(data => {
      document.getElementById('statCourses').textContent = data.totalCourses || 0;
      document.getElementById('statAssessments').textContent = data.totalAssessments || 0;
      document.getElementById('statSubmissions').textContent = data.totalSubmissions || 0;
      document.getElementById('statGraded').textContent = data.totalGraded || 0;

      const div = document.getElementById('dashCourses');
      if (data.courses && data.courses.length > 0) {
        div.innerHTML = data.courses.map(c => `
          <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-purple-100 text-purple-700 rounded-lg flex items-center justify-center text-xs font-bold">📚</div>
              <div>
                <p class="text-sm font-semibold text-gray-800">${c.course_code}</p>
                <p class="text-xs text-gray-400">${c.course_title}</p>
              </div>
            </div>
            <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-medium">Active</span>
          </div>`).join('');
      } else {
        div.innerHTML = '<p class="text-gray-400 text-sm">No courses assigned yet.</p>';
      }

      // Draw Charts
      setTimeout(() => {
        const subCtx = document.getElementById('submissionsChart');
        if (subCtx) {
          new Chart(subCtx, {
            type: 'bar',
            data: {
              labels: ['Total', 'Graded', 'Pending'],
              datasets: [{
                label: 'Submissions',
                data: [
                  data.totalSubmissions || 0,
                  data.totalGraded || 0,
                  Math.max(0, (data.totalSubmissions || 0) - (data.totalGraded || 0))
                ],
                backgroundColor: ['#7c3aed', '#10b981', '#f59e0b'],
                borderRadius: 10,
                borderSkipped: false
              }]
            },
            options: {
              responsive: true,
              plugins: { legend: { display: false } },
              scales: {
                y: { beginAtZero: true, ticks: { stepSize: 1 } },
                x: { grid: { display: false } }
              }
            }
          });
        }

        const typeCtx = document.getElementById('assessmentTypesChart');
        if (typeCtx) {
          new Chart(typeCtx, {
            type: 'pie',
            data: {
              labels: ['Objective', 'Theory', 'Programming'],
              datasets: [{
                data: [
                  Math.ceil((data.totalAssessments || 1) * 0.4),
                  Math.ceil((data.totalAssessments || 1) * 0.4),
                  Math.floor((data.totalAssessments || 1) * 0.2)
                ],
                backgroundColor: ['#ec4899', '#3b82f6', '#10b981'],
                borderWidth: 0
              }]
            },
            options: {
              responsive: true,
              plugins: {
                legend: { position: 'bottom', labels: { padding: 12, font: { size: 11 } } }
              }
            }
          });
        }
      }, 100);

    }).catch(() => {});
  }
  
  function loadCourses() {
    document.getElementById('mainContent').innerHTML = `
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-6 border-b"><h2 class="text-lg font-bold text-gray-900">My Courses</h2></div>
        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4" id="coursesList">
          <div class="text-gray-400 text-sm">Loading courses...</div>
        </div>
      </div>`;

    fetch('/lecturer/courses').then(r => r.json()).then(data => {
      const div = document.getElementById('coursesList');
      if (!data.courses || data.courses.length === 0) {
        div.innerHTML = '<p class="text-gray-400 text-sm">No courses assigned yet.</p>'; return;
      }
      div.innerHTML = data.courses.map(c => `
        <div class="border-2 border-gray-100 hover:border-purple-300 rounded-2xl p-6 transition-all">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 bg-purple-100 text-purple-700 rounded-xl flex items-center justify-center font-bold">📚</div>
            <div>
              <p class="font-bold text-gray-800">${c.course_code}</p>
              <p class="text-xs text-gray-500">${c.course_title}</p>
            </div>
          </div>
          <span class="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-semibold">Active</span>
        </div>`).join('');
    }).catch(() => {});
  }

  function loadAssessments() {
    document.getElementById('mainContent').innerHTML = `
      <div class="space-y-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="p-6 border-b"><h2 class="text-lg font-bold text-gray-900">Create New Assessment</h2></div>
          <div class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Assessment Title</label>
                <input type="text" id="assessTitle" placeholder="e.g. Mid-Semester Exam"
                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Assessment Type</label>
                <select id="assessType" onchange="showQuestionForm()"
                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none appearance-none">
                  <option value="">Select Type</option>
                  <option value="objective">Objective (MCQ / True-False)</option>
                  <option value="theory">Theory (Keyword-based)</option>
                  <option value="programming">Programming (Test Cases)</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Course</label>
                <select id="assessCourse"
                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none appearance-none">
                  <option value="">Select Course</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Duration (minutes)</label>
                <input type="number" id="assessDuration" value="30"
                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/>
              </div>
            </div>

            <div id="questionForm" class="hidden mt-4 border-t pt-4">
              <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-gray-800">Add Questions</h3>
                <span id="questionCount" class="text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded-full font-semibold">0 questions added</span>
              </div>
              <div id="questionFields"></div>
              <button onclick="addQuestion()" class="mt-4 flex items-center gap-2 text-purple-700 hover:text-purple-900 text-sm font-semibold">
                <i class="fas fa-plus-circle"></i> Add Another Question
              </button>
            </div>

            <div class="flex gap-3 pt-2">
              <button onclick="saveAssessment(false)" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-3 rounded-xl text-sm font-semibold">
                <i class="fas fa-save mr-2"></i>Save as Draft
              </button>
              <button onclick="saveAssessment(true)" class="bg-purple-700 hover:bg-purple-800 text-white px-6 py-3 rounded-xl text-sm font-semibold">
                <i class="fas fa-paper-plane mr-2"></i>Publish Assessment
              </button>
            </div>
            <div id="assessMsg" class="hidden text-sm font-medium mt-2"></div>
          </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="p-6 border-b"><h2 class="text-lg font-bold text-gray-900">My Assessments</h2></div>
          <div class="p-6">
            <table class="w-full text-sm">
              <thead><tr class="text-left text-gray-500 border-b">
                <th class="pb-3 font-semibold">Title</th>
                <th class="pb-3 font-semibold">Type</th>
                <th class="pb-3 font-semibold">Course</th>
               <th class="pb-3 font-semibold">Status</th>
              <th class="pb-3 font-semibold">Analytics</th>
            </tr></thead>
            <tbody id="assessmentsList">
              <tr><td colspan="5" class="py-4 text-gray-400 text-sm">No assessments yet.</td></tr>
            </tbody>
            </table>
          </div>
        </div>
      </div>`;

    fetchLecturerCourses();
    fetchLecturerAssessments();
  }

  function fetchLecturerCourses() {

  function saveAssessment(publish) {
    const title = document.getElementById('assessTitle').value;
    const type = document.getElementById('assessType').value;
    const courseId = document.getElementById('assessCourse').value;
    const duration = document.getElementById('assessDuration').value;
    const msg = document.getElementById('assessMsg');

    if (!title || !type || !courseId) {
      msg.textContent = 'Please fill in all fields.';
      msg.className = 'text-sm font-medium text-red-600';
      msg.classList.remove('hidden'); return;
    }

    // Collect questions
    const questions = [];
    for (let i = 1; i <= questionCount; i++) {
      const qtext = document.getElementById(`qtext${i}`)?.value;
      if (!qtext) continue;
      const q = { question_text: qtext, question_type: type === 'objective' ? 'mcq' : type, marks: document.getElementById(`marks${i}`)?.value || 1 };
      if (type === 'objective') {
        q.options = { A: document.getElementById(`optA${i}`)?.value, B: document.getElementById(`optB${i}`)?.value, C: document.getElementById(`optC${i}`)?.value, D: document.getElementById(`optD${i}`)?.value };
        q.correct_answer = document.getElementById(`correct${i}`)?.value;
      } else if (type === 'theory') {
        q.keywords = document.getElementById(`keywords${i}`)?.value;
      } else if (type === 'programming') {
        q.test_case = document.getElementById(`testcase${i}`)?.value;
      }
      questions.push(q);
    }

    fetch('/lecturer/assessments/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, type, courseId, duration, publish, questions })
    }).then(r => r.json()).then(data => {
      if (data.success) {
        msg.textContent = publish ? '✅ Assessment published successfully!' : '✅ Assessment saved as draft!';
        msg.className = 'text-sm font-medium text-green-600';
        msg.classList.remove('hidden');
        fetchLecturerAssessments();
      } else {
        msg.textContent = data.message || 'Failed to save assessment.';
        msg.className = 'text-sm font-medium text-red-600';
        msg.classList.remove('hidden');
      }
    }).catch(() => {
      msg.textContent = 'Server error. Please try again.';
      msg.className = 'text-sm font-medium text-red-600';
      msg.classList.remove('hidden');
    });
  }

      <div class="max-w-2xl mx-auto space-y-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="p-6 border-b flex items-center gap-3">
            <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center"><i class="fas fa-user text-purple-600"></i></div>
            <div><h2 class="text-lg font-bold text-gray-900">Profile Settings</h2><p class="text-xs text-gray-500">Update your information</p></div>
          </div>
          <div class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
                <input type="text" id="updateName" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                <input type="email" id="updateEmail" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/>
              </div>
            </div>
            <div id="profileMsg" class="hidden text-sm font-medium"></div>
            <button onclick="updateProfile()" class="bg-purple-700 text-white px-6 py-3 rounded-xl text-sm font-semibold hover:bg-purple-800">
              <i class="fas fa-save mr-2"></i>Save Changes
            </button>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="p-6 border-b flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center"><i class="fas fa-lock text-blue-600"></i></div>
            <div><h2 class="text-lg font-bold text-gray-900">Change Password</h2><p class="text-xs text-gray-500">Keep your account secure</p></div>
          </div>
          <div class="p-6 space-y-4">
            <input type="password" id="currentPassword" placeholder="Current password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/>
            <div class="grid grid-cols-2 gap-4">
              <input type="password" id="newPassword" placeholder="New password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/>
              <input type="password" id="confirmNewPassword" placeholder="Confirm new password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/>
            </div>
            <div id="passwordMsg" class="hidden text-sm font-medium"></div>
            <button onclick="updatePassword()" class="bg-blue-600 text-white px-6 py-3 rounded-xl text-sm font-semibold hover:bg-blue-700">
              <i class="fas fa-key mr-2"></i>Update Password
            </button>
          </div>
        </div>
      </div>`;

    fetch('/auth/me').then(r => r.json()).then(data => {
      document.getElementById('updateName').value = data.fullName || '';
      document.getElementById('updateEmail').value = data.email || '';
    });
  }

  function updateProfile() {
    const name = document.getElementById('updateName').value;
    const email = document.getElementById('updateEmail').value;
    const msg = document.getElementById('profileMsg');
    if (!name || !email) {
      msg.textContent = 'Name and email are required.';
      msg.className = 'text-sm font-medium text-red-600';
      msg.classList.remove('hidden'); return;
    }
    fetch('/lecturer/settings/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fullName: name, email })
    }).then(r => r.json()).then(data => {
      if (data.success) {
        msg.textContent = '✅ Profile updated!';
        msg.className = 'text-sm font-medium text-green-600';
        msg.classList.remove('hidden');
        document.getElementById('lecturerName').textContent = name;
        document.getElementById('headerName').textContent = name;
      } else {
        msg.textContent = data.message || 'Failed.';
        msg.className = 'text-sm font-medium text-red-600';
        msg.classList.remove('hidden');
      }
    });
  }

  function updatePassword() {
    const current = document.getElementById('currentPassword').value;
    const newPass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmNewPassword').value;
    const msg = document.getElementById('passwordMsg');
    if (!current || !newPass || !confirm) {
      msg.textContent = 'All fields are required.';
      msg.className = 'text-sm font-medium text-red-600';
      msg.classList.remove('hidden'); return;
    }
    if (newPass !== confirm) {
      msg.textContent = 'Passwords do not match.';
      msg.className = 'text-sm font-medium text-red-600';
      msg.classList.remove('hidden'); return;
    }
    fetch('/lecturer/settings/password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword: current, newPassword: newPass })
    }).then(r => r.json()).then(data => {
      if (data.success) {
        msg.textContent = '✅ Password updated!';
        msg.className = 'text-sm font-medium text-green-600';
        msg.classList.remove('hidden');
      } else {
        msg.textContent = data.message || 'Failed.';
        msg.className = 'text-sm font-medium text-red-600';
        msg.classList.remove('hidden');
      }
    });
  }

  function logout() {
    if (confirm('Logout?')) window.location.href = '/auth/logout';
  }
// Upload profile photo
function uploadPhoto(input) {
  const file = input.files[0];
  if (!file) return;

  if (file.size > 2 * 1024 * 1024) {
    alert('Photo must be under 2MB.', 'error');
    return;
  }

  const formData = new FormData();
  formData.append('photo', file);

  alert('Uploading photo...', 'info', 2000);

  fetch('/auth/upload-photo', {
    method: 'POST',
    body: formData
  }).then(r => r.json()).then(data => {
    if (data.success) {
      setAvatarPhoto(data.photoPath);
      alert('Profile photo updated! ✅', 'success');
    } else {
      alert(data.message || 'Upload failed.', 'error');
    }
  }).catch(() => {
    alert('Server error. Please try again.', 'error');
  });
}

// Set avatar to photo or initial letter
function setAvatarPhoto(photoPath) {
  const avatar = document.getElementById('sidebarAvatar');
  if (photoPath) {
    avatar.innerHTML = `<img src="${photoPath}" alt="Profile" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  }
}

</script>
</body>
</html>
