<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGLAS - Admin Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f5f0ff; }
    .sidebar { background: linear-gradient(180deg, #1a0a35 0%, #3b0764 50%, #1a0a35 100%); }
    .nav-item.active { background: rgba(255,255,255,0.15); border-left: 3px solid #a855f7; }
    .nav-item:hover { background: rgba(255,255,255,0.08); cursor: pointer; }
    header { background: white; border-bottom: 2px solid #ede9fe; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -256px; top: 0; bottom: 0; z-index: 50; transition: left 0.3s ease; width: 256px !important; }
      .sidebar.open { left: 0; }
      .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
      .sidebar-overlay.show { display: block; }
      .flex.h-screen { display: block; height: 100vh; }
      .flex-1.overflow-auto { height: 100vh; overflow-y: auto; }
      header { padding: 12px 16px !important; }
      .p-8 { padding: 16px !important; }
      .lg\\:grid-cols-2 { grid-template-columns: 1fr !important; }
      .lg\\:grid-cols-4 { grid-template-columns: repeat(2,1fr) !important; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <div class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <div class="sidebar w-64 text-white flex flex-col flex-shrink-0">
      <div class="px-6 pt-8 pb-6 border-b border-purple-800">
        <div class="flex items-center gap-3">
          <i class="fas fa-graduation-cap text-3xl" style="color:#f5c518"></i>
          <div>
            <h1 class="text-xl font-bold tracking-wider">AGLAS</h1>
            <p class="text-purple-200 text-xs">Admin Portal</p>
          </div>
        </div>
      </div>
      <div class="px-4 flex-1 overflow-y-auto">
        <div class="py-6 flex flex-col items-center text-center border-b border-purple-800 mb-4">
          <div class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center text-2xl font-bold ring-2 ring-purple-400 mb-3" id="sidebarAvatar">A</div>
          <p class="font-semibold text-sm" id="adminName">Admin</p>
          <p class="text-purple-300 text-xs mt-0.5">Administrator</p>
        </div>
        <nav class="space-y-1">
          <div onclick="showPage('dashboard', this)" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
            <i class="fas fa-home w-4"></i><span class="text-sm font-medium">Dashboard</span>
          </div>
          <div onclick="showPage('users', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
            <i class="fas fa-users w-4"></i><span class="text-sm font-medium">Manage Users</span>
          </div>
          <div onclick="showPage('courses', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
            <i class="fas fa-book w-4"></i><span class="text-sm font-medium">Manage Courses</span>
          </div>
          <div onclick="showPage('enrollments', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
            <i class="fas fa-user-plus w-4"></i><span class="text-sm font-medium">Enrollments</span>
          </div>
          <div onclick="showPage('assessments', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
            <i class="fas fa-file-alt w-4"></i><span class="text-sm font-medium">Assessments</span>
          </div>
          <div onclick="showPage('reports', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
            <i class="fas fa-chart-line w-4"></i><span class="text-sm font-medium">Reports</span>
          </div>
          <div onclick="showPage('settings', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
            <i class="fas fa-cog w-4"></i><span class="text-sm font-medium">Settings</span>
          </div>
        </nav>
      </div>
      <div class="p-4 border-t border-purple-800">
        <button onclick="logout()" class="w-full flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 py-3 rounded-2xl text-white text-sm font-medium transition-all">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 overflow-auto">
      <header class="bg-white border-b px-4 md:px-8 py-4 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center gap-3">
          <button onclick="toggleSidebar()" class="md:hidden w-9 h-9 flex items-center justify-center rounded-xl bg-gray-100 hover:bg-gray-200">
            <i class="fas fa-bars text-gray-600"></i>
          </button>
          <h1 id="pageTitle" class="text-xl md:text-2xl font-bold text-gray-900">Dashboard</h1>
        </div>
        <div class="flex items-center gap-2 md:gap-3">
          <div class="hidden md:flex items-center bg-green-100 text-green-700 px-4 py-2 rounded-full text-xs font-medium">
            <div class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></div>
            System Online
          </div>
          <div class="flex items-center gap-2">
            <div class="text-right hidden md:block">
              <p class="font-semibold text-gray-800 text-sm" id="headerName"></p>
              <p class="text-xs text-gray-500">Administrator</p>
            </div>
            <div class="w-9 h-9 bg-purple-100 text-purple-700 rounded-full flex items-center justify-center font-bold ring-2 ring-purple-300" id="headerAvatar">A</div>
          </div>
        </div>
      </header>
      <div class="p-4 md:p-8" id="mainContent"></div>
    </div>
  </div>

<script>
  function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        if (window.innerWidth < 768) {
          document.querySelector('.sidebar').classList.remove('open');
          document.getElementById('sidebarOverlay').classList.remove('show');
        }
      });
    });
  });

  let currentUser = {};
  let allUsers = [];
  let allCourses = [];

  fetch('/auth/me').then(r => r.json()).then(data => {
    if (!data.fullName) { window.location.href = '/auth/login'; return; }
    currentUser = data;
    const initial = data.fullName.charAt(0).toUpperCase();
    document.getElementById('adminName').textContent = data.fullName;
    document.getElementById('headerName').textContent = data.fullName;
    document.getElementById('sidebarAvatar').textContent = initial;
    document.getElementById('headerAvatar').textContent = initial;
    loadDashboard();
  }).catch(() => { window.location.href = '/auth/login'; });

  function showPage(page, el) {
    document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    const titles = { dashboard:'Dashboard', users:'Manage Users', courses:'Manage Courses', enrollments:'Enrollments', assessments:'Assessments', reports:'System Reports', settings:'Settings' };
    document.getElementById('pageTitle').textContent = titles[page] || 'Dashboard';
    if (page === 'dashboard') loadDashboard();
    else if (page === 'users') loadUsers();
    else if (page === 'courses') loadCourses();
    else if (page === 'enrollments') loadEnrollments();
    else if (page === 'assessments') loadAssessments();
    else if (page === 'settings') loadSettings();
    else if (page === 'reports') loadReports();
  }

  function getGreeting() {
    const h = new Date().getHours();
    return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  }

  // ── DASHBOARD ────────────────────────────────────────
  function loadDashboard() {
    document.getElementById('mainContent').innerHTML =
      '<div class="bg-gradient-to-r from-purple-900 to-purple-700 rounded-2xl p-6 md:p-8 mb-6 text-white relative overflow-hidden">' +
        '<div class="absolute right-0 top-0 w-64 h-full opacity-10"><i class="fas fa-shield-alt text-9xl absolute right-8 top-6"></i></div>' +
        '<p class="text-purple-200 text-sm mb-1">' + getGreeting() + ',</p>' +
        '<h2 class="text-2xl md:text-3xl font-bold mb-2">Welcome back, ' + (currentUser.fullName||'Admin') + '</h2>' +
        '<p class="text-purple-200 text-sm mb-4">You have full control of the AGLAS system.</p>' +
        '<div class="flex gap-3 flex-wrap">' +
          '<button onclick="showPage(\'users\', document.querySelectorAll(\'.nav-item\')[1])" class="bg-white text-purple-700 px-5 py-2 rounded-xl text-sm font-bold hover:bg-purple-50 transition-all"><i class="fas fa-users mr-2"></i>Manage Users</button>' +
          '<button onclick="showPage(\'courses\', document.querySelectorAll(\'.nav-item\')[2])" class="bg-white/20 hover:bg-white/30 text-white px-5 py-2 rounded-xl text-sm font-bold transition-all"><i class="fas fa-book mr-2"></i>Manage Courses</button>' +
        '</div>' +
      '</div>' +
      '<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">' +
        '<div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100"><div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-users text-purple-600"></i></div><p id="statUsers" class="text-3xl font-bold text-gray-900 mb-1">0</p><p class="text-sm text-gray-500">Total Users</p></div>' +
        '<div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100"><div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-book text-blue-600"></i></div><p id="statCourses" class="text-3xl font-bold text-gray-900 mb-1">0</p><p class="text-sm text-gray-500">Total Courses</p></div>' +
        '<div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100"><div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-file-alt text-green-600"></i></div><p id="statAssessments" class="text-3xl font-bold text-gray-900 mb-1">0</p><p class="text-sm text-gray-500">Assessments</p></div>' +
        '<div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100"><div class="w-10 h-10 bg-pink-100 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-user-graduate text-pink-600"></i></div><p id="statStudents" class="text-3xl font-bold text-gray-900 mb-1">0</p><p class="text-sm text-gray-500">Students</p></div>' +
      '</div>' +
      '<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">' +
        '<div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100"><h2 class="text-lg font-bold text-gray-900 mb-4">Users by Role</h2><canvas id="usersChart" height="220"></canvas></div>' +
        '<div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100"><h2 class="text-lg font-bold text-gray-900 mb-4">Quick Actions</h2><div class="space-y-3" id="quickActions"><p class="text-gray-400 text-sm">Loading...</p></div></div>' +
      '</div>' +
      '<div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100"><h2 class="text-lg font-bold text-gray-900 mb-4">Recent Users</h2><div id="recentUsers"><p class="text-gray-400 text-sm">Loading...</p></div></div>';

    fetch('/admin/stats').then(r => r.json()).then(data => {
      document.getElementById('statUsers').textContent = data.totalUsers || 0;
      document.getElementById('statCourses').textContent = data.totalCourses || 0;
      document.getElementById('statAssessments').textContent = data.totalAssessments || 0;
      document.getElementById('statStudents').textContent = data.totalStudents || 0;

      document.getElementById('quickActions').innerHTML =
        '<button onclick="showPage(\'users\', document.querySelectorAll(\'.nav-item\')[1])" class="w-full flex items-center gap-3 p-4 bg-purple-50 hover:bg-purple-100 rounded-xl transition-all text-left"><i class="fas fa-user-plus text-purple-600"></i><div><p class="font-semibold text-sm text-gray-800">Add New User</p><p class="text-xs text-gray-500">Create student, lecturer or admin account</p></div></button>' +
        '<button onclick="showPage(\'courses\', document.querySelectorAll(\'.nav-item\')[2])" class="w-full flex items-center gap-3 p-4 bg-blue-50 hover:bg-blue-100 rounded-xl transition-all text-left"><i class="fas fa-plus-circle text-blue-600"></i><div><p class="font-semibold text-sm text-gray-800">Add New Course</p><p class="text-xs text-gray-500">Create a new course in the system</p></div></button>' +
        '<button onclick="showPage(\'enrollments\', document.querySelectorAll(\'.nav-item\')[3])" class="w-full flex items-center gap-3 p-4 bg-green-50 hover:bg-green-100 rounded-xl transition-all text-left"><i class="fas fa-user-check text-green-600"></i><div><p class="font-semibold text-sm text-gray-800">Manage Enrollments</p><p class="text-xs text-gray-500">Enroll students into courses</p></div></button>';

      setTimeout(() => {
        const ctx = document.getElementById('usersChart');
        if (ctx) {
          new Chart(ctx, {
            type: 'doughnut',
            data: { labels:['Students','Lecturers','Admins'], datasets:[{ data:[data.totalStudents||0, data.totalLecturers||0, data.totalAdmins||0], backgroundColor:['#7c3aed','#3b82f6','#10b981'], borderWidth:0, hoverOffset:8 }] },
            options: { responsive:true, plugins:{ legend:{ position:'bottom', labels:{ padding:16, font:{ size:12 } } } } }
          });
        }
      }, 100);

      const recentDiv = document.getElementById('recentUsers');
      if (data.recentUsers && data.recentUsers.length > 0) {
        recentDiv.innerHTML = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-gray-500 border-b bg-gray-50"><th class="pb-3 pt-2 px-2 font-semibold">Name</th><th class="pb-3 pt-2 px-2 font-semibold">Email</th><th class="pb-3 pt-2 px-2 font-semibold">Role</th><th class="pb-3 pt-2 px-2 font-semibold">Status</th></tr></thead><tbody class="divide-y divide-gray-50">' +
          data.recentUsers.map(u =>
            '<tr class="hover:bg-gray-50"><td class="py-3 px-2 font-medium text-gray-800">' + u.full_name + '</td><td class="py-3 px-2 text-gray-500">' + u.email + '</td><td class="py-3 px-2"><span class="px-2 py-1 rounded-full text-xs font-semibold ' + (u.role==='admin'?'bg-purple-100 text-purple-700':u.role==='lecturer'?'bg-blue-100 text-blue-700':'bg-green-100 text-green-700') + '">' + u.role + '</span></td><td class="py-3 px-2"><span class="px-2 py-1 rounded-full text-xs font-semibold ' + (u.is_active?'bg-green-100 text-green-700':'bg-red-100 text-red-600') + '">' + (u.is_active?'Active':'Inactive') + '</span></td></tr>'
          ).join('') + '</tbody></table></div>';
      } else {
        recentDiv.innerHTML = '<p class="text-gray-400 text-sm">No users yet.</p>';
      }
    }).catch(() => {});
  }

  // ── USERS ────────────────────────────────────────────
  function loadUsers() {
    document.getElementById('mainContent').innerHTML =
      '<div class="space-y-6">' +
        '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">' +
          '<div class="p-6 border-b flex items-center justify-between"><h2 class="text-lg font-bold text-gray-900">Add New User</h2><button onclick="toggleAddUserForm()" class="bg-purple-700 hover:bg-purple-800 text-white px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2"><i class="fas fa-plus"></i> Add User</button></div>' +
          '<div id="addUserForm" class="hidden p-6 border-b bg-purple-50">' +
            '<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">' +
              '<div><label class="block text-sm font-semibold text-gray-700 mb-2">Surname</label><input type="text" id="newSurname" placeholder="e.g. BAMIDELE" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none bg-white"/></div>' +
              '<div><label class="block text-sm font-semibold text-gray-700 mb-2">First Name</label><input type="text" id="newFirstName" placeholder="e.g. Grace" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none bg-white"/></div>' +
              '<div><label class="block text-sm font-semibold text-gray-700 mb-2">Email</label><input type="email" id="newEmail" placeholder="email@example.com" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none bg-white"/></div>' +
              '<div><label class="block text-sm font-semibold text-gray-700 mb-2">Password</label><input type="password" id="newPassword" placeholder="Set password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none bg-white"/></div>' +
              '<div><label class="block text-sm font-semibold text-gray-700 mb-2">Role</label><select id="newRole" onchange="toggleIdField()" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none bg-white"><option value="">Select Role</option><option value="student">Student</option><option value="lecturer">Lecturer</option><option value="admin">Admin</option></select></div>' +
              '<div id="idField"><label class="block text-sm font-semibold text-gray-700 mb-2" id="idLabel">Matric Number</label><input type="text" id="newIdNumber" placeholder="e.g. CSC/2021/001" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none bg-white"/></div>' +
            '</div>' +
            '<div id="addUserMsg" class="hidden text-sm font-medium mb-3"></div>' +
            '<div class="flex gap-3"><button onclick="addUser()" class="bg-purple-700 text-white px-6 py-2 rounded-xl text-sm font-semibold hover:bg-purple-800">Add User</button><button onclick="toggleAddUserForm()" class="bg-white border-2 border-gray-200 text-gray-600 px-6 py-2 rounded-xl text-sm font-semibold">Cancel</button></div>' +
          '</div>' +
        '</div>' +
        '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">' +
          '<div class="p-6 border-b"><h2 class="text-lg font-bold text-gray-900">All Users</h2></div>' +
          '<div class="p-4 border-b bg-gray-50 flex items-center gap-4 flex-wrap">' +
            '<div class="relative flex-1 min-w-48"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i><input type="text" id="userSearch" placeholder="Search by name or email..." oninput="filterUsers()" class="w-full pl-9 pr-4 py-2.5 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/></div>' +
            '<select id="roleFilter" onchange="filterUsers()" class="px-4 py-2.5 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"><option value="">All Roles</option><option value="student">Students</option><option value="lecturer">Lecturers</option><option value="admin">Admins</option></select>' +
            '<span id="userCount" class="text-sm text-gray-500"></span>' +
          '</div>' +
          '<div class="p-6" id="usersList"><p class="text-gray-400 text-sm">Loading...</p></div>' +
        '</div>' +
      '</div>';
    fetchUsers();
  }

  function toggleAddUserForm() {
    document.getElementById('addUserForm').classList.toggle('hidden');
  }

  function toggleIdField() {
    const role = document.getElementById('newRole').value;
    const idField = document.getElementById('idField');
    const idLabel = document.getElementById('idLabel');
    if (role === 'student') { idField.style.display='block'; idLabel.textContent='Matric Number'; document.getElementById('newIdNumber').placeholder='e.g. CSC/2021/001'; }
    else if (role === 'lecturer') { idField.style.display='block'; idLabel.textContent='Staff Number'; document.getElementById('newIdNumber').placeholder='e.g. STAFF/2021/001'; }
    else { idField.style.display='none'; }
  }

  function addUser() {
    const surname = document.getElementById('newSurname').value.trim();
    const firstName = document.getElementById('newFirstName').value.trim();
    const email = document.getElementById('newEmail').value.trim();
    const password = document.getElementById('newPassword').value;
    const role = document.getElementById('newRole').value;
    const idNumber = document.getElementById('newIdNumber').value.trim();
    const msg = document.getElementById('addUserMsg');
    if (!surname || !firstName || !email || !password || !role) { msg.textContent='All fields are required.'; msg.className='text-sm font-medium text-red-600'; msg.classList.remove('hidden'); return; }
    fetch('/admin/users/add', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({surname,firstName,email,password,role,matricNumber:role==='student'?idNumber:null,staffNumber:role==='lecturer'?idNumber:null}) })
      .then(r => r.json()).then(data => {
        if (data.success) { alert('User added successfully.'); toggleAddUserForm(); fetchUsers(); }
        else { msg.textContent=data.message||'Failed to add user.'; msg.className='text-sm font-medium text-red-600'; msg.classList.remove('hidden'); }
      }).catch(() => { msg.textContent='Server error.'; msg.className='text-sm font-medium text-red-600'; msg.classList.remove('hidden'); });
  }

  function fetchUsers() {
    fetch('/admin/users').then(r => r.json()).then(data => {
      allUsers = data.users || [];
      renderUsers(allUsers);
    }).catch(() => {});
  }

  function filterUsers() {
    const search = document.getElementById('userSearch').value.toLowerCase();
    const role = document.getElementById('roleFilter').value;
    renderUsers(allUsers.filter(u => (u.full_name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search)) && (role===''||u.role===role)));
  }

  function renderUsers(users) {
    const div = document.getElementById('usersList');
    const count = document.getElementById('userCount');
    if (count) count.textContent = users.length + ' user' + (users.length!==1?'s':'') + ' found';
    if (!users || users.length === 0) { div.innerHTML = '<p class="text-gray-400 text-sm">No users found.</p>'; return; }
    div.innerHTML = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-gray-500 border-b bg-gray-50"><th class="pb-3 pt-2 px-2 font-semibold">Name</th><th class="pb-3 pt-2 px-2 font-semibold">Email</th><th class="pb-3 pt-2 px-2 font-semibold">Role</th><th class="pb-3 pt-2 px-2 font-semibold">ID Number</th><th class="pb-3 pt-2 px-2 font-semibold">Status</th><th class="pb-3 pt-2 px-2 font-semibold">Last Login</th><th class="pb-3 pt-2 px-2 font-semibold">Action</th></tr></thead><tbody class="divide-y divide-gray-50">' +
      users.map(u =>
        '<tr class="hover:bg-gray-50">' +
          '<td class="py-3 px-2"><div class="flex items-center gap-3"><div class="w-8 h-8 bg-purple-100 text-purple-700 rounded-lg flex items-center justify-center font-bold text-sm">' + u.full_name.charAt(0) + '</div><span class="font-medium text-gray-800">' + u.full_name + '</span></div></td>' +
          '<td class="py-3 px-2 text-gray-500">' + u.email + '</td>' +

  function toggleAddCourseForm() {
    document.getElementById('addCourseForm').classList.toggle('hidden');
  }

  function loadLecturersIntoSelect(selectId) {
    fetch('/admin/users').then(r => r.json()).then(data => {
      const select = document.getElementById(selectId);
      if (!select) return;
      const lecturers = (data.users||[]).filter(u => u.role === 'lecturer');
      lecturers.forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.user_id; opt.textContent = l.full_name;
        select.appendChild(opt);
      });
    });
  }

  function addCourse() {
    const code = document.getElementById('newCourseCode').value.trim();
    const title = document.getElementById('newCourseTitle').value.trim();
    const lecturerId = document.getElementById('newCourseLecturer').value;
    const msg = document.getElementById('addCourseMsg');
    if (!code || !title) { msg.textContent='Course code and title are required.'; msg.className='text-sm font-medium text-red-600'; msg.classList.remove('hidden'); return; }
    fetch('/admin/courses/add', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({courseCode:code, courseTitle:title, lecturerId:lecturerId||null}) })
      .then(r => r.json()).then(data => {
        if (data.success) { alert('Course added successfully.'); toggleAddCourseForm(); fetchCourses(); }
        else { msg.textContent=data.message||'Failed to add course.'; msg.className='text-sm font-medium text-red-600'; msg.classList.remove('hidden'); }
      }).catch(() => { msg.textContent='Server error.'; msg.className='text-sm font-medium text-red-600'; msg.classList.remove('hidden'); });
  }

  function fetchCourses() {
    fetch('/admin/courses').then(r => r.json()).then(data => {
      allCourses = data.courses || [];
      renderCourses(allCourses);
    }).catch(() => {});
  }

  function filterCourses() {
    const search = document.getElementById('courseSearch').value.toLowerCase();
    renderCourses(allCourses.filter(c => c.course_code.toLowerCase().includes(search) || c.course_title.toLowerCase().includes(search)));
  }

  function renderCourses(courses) {
    const div = document.getElementById('coursesList');
    const count = document.getElementById('courseCount');
    if (count) count.textContent = courses.length + ' course' + (courses.length!==1?'s':'') + ' found';
    if (!courses || courses.length === 0) { div.innerHTML = '<p class="text-gray-400 text-sm">No courses found.</p>'; return; }
    div.innerHTML = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-gray-500 border-b bg-gray-50"><th class="pb-3 pt-2 px-2 font-semibold">Course Code</th><th class="pb-3 pt-2 px-2 font-semibold">Course Title</th><th class="pb-3 pt-2 px-2 font-semibold">Lecturer</th><th class="pb-3 pt-2 px-2 font-semibold">Action</th></tr></thead><tbody class="divide-y divide-gray-50">' +
      courses.map(c =>
        '<tr class="hover:bg-gray-50">' +
          '<td class="py-3 px-2 font-bold text-purple-700">' + c.course_code + '</td>' +
          '<td class="py-3 px-2 font-medium text-gray-800">' + c.course_title + '</td>' +
          '<td class="py-3 px-2 text-gray-500">' + (c.lecturer_name||'Not assigned') + '</td>' +
          '<td class="py-3 px-2"><button onclick="deleteCourse(' + c.course_id + ', \'' + c.course_code.replace(/'/g,"\\'") + '\')" class="text-red-500 hover:text-red-700 text-xs font-semibold px-3 py-1.5 bg-red-50 rounded-lg"><i class="fas fa-trash mr-1"></i>Delete</button></td>' +
        '</tr>'
      ).join('') + '</tbody></table></div>';
  }

    if (!confirm('Delete course "' + code + '"? This will also delete all assessments and enrollments.')) return;
    fetch('/admin/courses/delete/' + id, { method:'DELETE' })
      .then(r => r.json()).then(data => {
        if (data.success) { alert('Course deleted successfully.'); fetchCourses(); }

    const courseId = document.getElementById('enrollCourse').value;

    if (!studentId || !courseId) { msg.textContent='Please select both a student and a course.'; msg.className='text-sm font-medium text-red-600'; msg.classList.remove('hidden'); return; }
    fetch('/admin/enrollments/add', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({studentId, courseId}) })
      .then(r => r.json()).then(data => {
        if (data.success) { alert('Student enrolled successfully.'); toggleAddEnrollForm(); fetchEnrollments(); }
        else { msg.textContent=data.message||'Failed to enroll.'; msg.className='text-sm font-medium text-red-600'; msg.classList.remove('hidden'); }
      }).catch(() => { msg.textContent='Server error.'; msg.className='text-sm font-medium text-red-600'; msg.classList.remove('hidden'); });

            '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-gray-500 border-b bg-gray-50"><th class="pb-3 pt-2 px-2 font-semibold">Course</th><th class="pb-3 pt-2 px-2 font-semibold">Submissions</th><th class="pb-3 pt-2 px-2 font-semibold">Average Score</th></tr></thead><tbody class="divide-y divide-gray-50">' +
            r.courseScores.map(c =>
              '<tr class="hover:bg-gray-50"><td class="py-3 px-2"><span class="font-bold text-purple-700">' + c.course_code + '</span> <span class="text-gray-600">' + c.course_title + '</span></td><td class="py-3 px-2 text-gray-700">' + c.total_submissions + '</td><td class="py-3 px-2 font-bold ' + (c.avg_score>=70?'text-green-600':c.avg_score>=50?'text-yellow-600':'text-red-500') + '">' + c.avg_score + '%</td></tr>'
            ).join('') + '</tbody></table></div>') +
          '</div>' +
        '</div>' +

        // Lecturer performance
        '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">' +
          '<div class="p-6 border-b"><h2 class="text-lg font-bold text-gray-900">Lecturer Performance (Avg Student Scores)</h2></div>' +
          '<div class="p-6">' +
          (r.lecturerStats.length === 0 ? '<p class="text-gray-400 text-sm">No data yet.</p>' :
            '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-gray-500 border-b bg-gray-50"><th class="pb-3 pt-2 px-2 font-semibold">Lecturer</th><th class="pb-3 pt-2 px-2 font-semibold">Assessments</th><th class="pb-3 pt-2 px-2 font-semibold">Average Student Score</th></tr></thead><tbody class="divide-y divide-gray-50">' +
            r.lecturerStats.map(l =>
              '<tr class="hover:bg-gray-50"><td class="py-3 px-2 font-medium text-gray-800">' + l.lecturer_name + '</td><td class="py-3 px-2 text-gray-700">' + l.assessment_count + '</td><td class="py-3 px-2 font-bold ' + (l.avg_score>=70?'text-green-600':l.avg_score>=50?'text-yellow-600':'text-red-500') + '">' + l.avg_score + '%</td></tr>'
            ).join('') + '</tbody></table></div>') +
          '</div>' +
        '</div>' +

        '</div>';

      // Render charts
      setTimeout(() => {
        // Course average scores bar chart
        const csCtx = document.getElementById('courseScoresChart');
        if (csCtx && r.courseScores.length > 0) {
          new Chart(csCtx, {
            type: 'bar',
            data: { labels: r.courseScores.map(c => c.course_code),
              datasets: [{ data: r.courseScores.map(c => c.avg_score), backgroundColor:'#7c3aed', borderRadius:8, borderSkipped:false }] },
            options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, max:100, ticks:{ callback:v=>v+'%' } }, x:{ grid:{ display:false } } } }
          });
        } else if (csCtx) { csCtx.parentElement.innerHTML += '<p class="text-gray-400 text-sm text-center mt-4">No data yet.</p>'; }

        // Pass/Fail doughnut
        const pfCtx = document.getElementById('passFailChart');
        if (pfCtx && r.passFail.total > 0) {
          new Chart(pfCtx, {
            type: 'doughnut',
            data: { labels:['Passed','Failed'], datasets:[{ data:[r.passFail.passed, r.passFail.failed], backgroundColor:['#10b981','#ef4444'], borderWidth:0, hoverOffset:8 }] },
            options: { responsive:true, plugins:{ legend:{ position:'bottom', labels:{ padding:16, font:{ size:12 } } } } }
          });
        } else if (pfCtx) { pfCtx.parentElement.innerHTML += '<p class="text-gray-400 text-sm text-center mt-4">No data yet.</p>'; }

        // Assessment type pie
        const atCtx = document.getElementById('assessTypeChart');
        if (atCtx && r.typeDistribution.length > 0) {
          new Chart(atCtx, {
            type: 'pie',
            data: { labels: r.typeDistribution.map(t => t.type.charAt(0).toUpperCase() + t.type.slice(1)),
              datasets: [{ data: r.typeDistribution.map(t => t.count), backgroundColor:['#ec4899','#3b82f6','#10b981','#f59e0b'], borderWidth:0 }] },
            options: { responsive:true, plugins:{ legend:{ position:'bottom', labels:{ padding:16, font:{ size:12 } } } } }
          });
        } else if (atCtx) { atCtx.parentElement.innerHTML += '<p class="text-gray-400 text-sm text-center mt-4">No data yet.</p>'; }

        // Monthly submissions line chart
        const moCtx = document.getElementById('monthlyChart');
        if (moCtx && r.monthlySubmissions.length > 0) {
          new Chart(moCtx, {
            type: 'line',
            data: { labels: r.monthlySubmissions.map(m => m.month),
              datasets: [{ label:'Submissions', data: r.monthlySubmissions.map(m => m.count), borderColor:'#7c3aed', backgroundColor:'rgba(124,58,237,0.1)', borderWidth:3, pointBackgroundColor:'#7c3aed', pointRadius:5, tension:0.4, fill:true }] },
            options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ stepSize:1 } }, x:{ grid:{ display:false } } } }
          });
        } else if (moCtx) { moCtx.parentElement.innerHTML += '<p class="text-gray-400 text-sm text-center mt-4">No data yet.</p>'; }
      }, 100);
    }).catch(() => { document.getElementById('mainContent').innerHTML = '<p class="text-gray-400 text-center py-8">Failed to load reports.</p>'; });
  }

function loadSettings() {
    document.getElementById('mainContent').innerHTML =
      '<div class="max-w-2xl mx-auto space-y-6">' +
      '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">' +
        '<div class="p-6 border-b flex items-center gap-3"><div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center"><i class="fas fa-user text-purple-600"></i></div><div><h2 class="text-lg font-bold text-gray-900">Profile Settings</h2><p class="text-xs text-gray-500">Update your information</p></div></div>' +
        '<div class="p-6 space-y-4"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label><input type="text" id="updateName" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/></div><div><label class="block text-sm font-semibold text-gray-700 mb-2">Email</label><input type="email" id="updateEmail" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/></div></div><div id="profileMsg" class="hidden text-sm font-medium"></div><button onclick="updateProfile()" class="bg-purple-700 text-white px-6 py-3 rounded-xl text-sm font-semibold hover:bg-purple-800"><i class="fas fa-save mr-2"></i>Save Changes</button></div>' +
      '</div>' +
      '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">' +
        '<div class="p-6 border-b flex items-center gap-3"><div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center"><i class="fas fa-lock text-blue-600"></i></div><div><h2 class="text-lg font-bold text-gray-900">Change Password</h2><p class="text-xs text-gray-500">Keep your account secure</p></div></div>' +
        '<div class="p-6 space-y-4"><input type="password" id="currentPassword" placeholder="Current password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><input type="password" id="newPasswordField" placeholder="New password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/><input type="password" id="confirmNewPassword" placeholder="Confirm new password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none"/></div><div id="passwordMsg" class="hidden text-sm font-medium"></div><button onclick="updatePassword()" class="bg-blue-600 text-white px-6 py-3 rounded-xl text-sm font-semibold hover:bg-blue-700"><i class="fas fa-key mr-2"></i>Update Password</button></div>' +
      '</div>' +
      '</div>';
    fetch('/auth/me').then(r => r.json()).then(data => {
      document.getElementById('updateName').value = data.fullName||'';
      document.getElementById('updateEmail').value = data.email||'';
    });
  }

  function updateProfile() {
    const name = document.getElementById('updateName').value;
    const email = document.getElementById('updateEmail').value;
    const msg = document.getElementById('profileMsg');
    if (!name||!email) { msg.textContent='Name and email are required.';msg.className='text-sm font-medium text-red-600';msg.classList.remove('hidden');return; }
    fetch('/admin/settings/profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fullName:name,email})})
      .then(r=>r.json()).then(data=>{
        if(data.success){msg.textContent='Profile updated successfully.';msg.className='text-sm font-medium text-green-600';msg.classList.remove('hidden');document.getElementById('adminName').textContent=name;document.getElementById('headerName').textContent=name;}
        else{msg.textContent=data.message||'Failed.';msg.className='text-sm font-medium text-red-600';msg.classList.remove('hidden');}
      });
  }

  function updatePassword() {
    const current=document.getElementById('currentPassword').value;
    const newPass=document.getElementById('newPasswordField').value;
    const confirm=document.getElementById('confirmNewPassword').value;
    const msg=document.getElementById('passwordMsg');
    if(!current||!newPass||!confirm){msg.textContent='All fields are required.';msg.className='text-sm font-medium text-red-600';msg.classList.remove('hidden');return;}
    if(newPass!==confirm){msg.textContent='Passwords do not match.';msg.className='text-sm font-medium text-red-600';msg.classList.remove('hidden');return;}
    fetch('/admin/settings/password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({currentPassword:current,newPassword:newPass})})
      .then(r=>r.json()).then(data=>{
        if(data.success){msg.textContent='Password updated successfully.';msg.className='text-sm font-medium text-green-600';msg.classList.remove('hidden');}
        else{msg.textContent=data.message||'Failed.';msg.className='text-sm font-medium text-red-600';msg.classList.remove('hidden');}
      });
  }

  function logout() {
    if (confirm('Are you sure you want to logout?')) window.location.href = '/auth/logout';
  }
</script>
</body>
</html>
