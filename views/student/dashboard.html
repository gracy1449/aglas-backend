<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGLAS • Student</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .sidebar { background: linear-gradient(180deg, #581c87 0%, #3b0764 100%); }
    .nav-item.active { background: rgba(255,255,255,0.15); }
    .nav-item:hover { background: rgba(255,255,255,0.1); cursor: pointer; }
    .welcome-card {
      background: linear-gradient(135deg, #260e38 0%, #5b21b6 50%, #1f1136 100%);
      position: relative; overflow: hidden; border-radius: 24px;
    }
    .badge { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }
    .floating { animation: floating 3s ease-in-out infinite; }
    @keyframes floating { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    .progress-bar { transition: width 0.8s ease; }
    .timer-danger { animation: blink 1s infinite; color: #ef4444 !important; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  /* Mobile Responsive */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: -256px;
    top: 0;
    bottom: 0;
    z-index: 50;
    transition: left 0.3s ease;
    width: 256px !important;
  }
  .sidebar.open {
    left: 0;
  }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 40;
  }
  .sidebar-overlay.show {
    display: block;
  }
  .flex.h-screen { display: block; }
  .flex-1.overflow-auto { height: 100vh; }
}
  </style>
</head>
<body class="bg-gray-50">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <div class="sidebar w-64 text-white flex flex-col flex-shrink-0">
    <div class="px-6 pt-8 pb-6 border-b border-purple-800">
      <div class="flex items-center gap-3">
        <i class="fas fa-graduation-cap text-3xl"></i>
        <div>
          <h1 class="text-xl font-bold">AGLAS</h1>
          <p class="text-purple-200 text-xs">Student Portal</p>
        </div>
      </div>
    </div>

    <div class="px-4 flex-1 overflow-y-auto">
      <!-- Profile Section -->
     <div class="py-6 flex flex-col items-center text-center border-b border-purple-800 mb-4">
  
  <!-- Clickable Avatar -->
  <div class="relative mb-3 cursor-pointer group" onclick="document.getElementById('photoInput').click()">
    <div class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center text-2xl font-bold ring-2 ring-purple-400 overflow-hidden" id="sidebarAvatar">S</div>
    <!-- Camera overlay on hover -->
    <div class="absolute inset-0 rounded-full bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
      <i class="fas fa-camera text-white text-sm"></i>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="photoInput" accept="image/jpeg,image/png,image/webp"
    class="hidden" onchange="uploadPhoto(this)"/>

  <p class="font-semibold text-sm" id="studentName">Student</p>
  <p class="text-purple-300 text-xs mt-0.5">Student</p>
  <p class="text-purple-200 text-xs mt-2 mb-1" id="sidebarMatric" style="display:none;">
    <span class="bg-white/10 px-3 py-1 rounded-full" id="sidebarMatricText"></span>
  </p>
</div>

      <!-- Nav Items -->
      <nav class="space-y-1">
        <div onclick="showPage('dashboard', this)" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-home w-4"></i><span class="text-sm font-medium">Dashboard</span>
        </div>
        <div onclick="showPage('courses', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-book w-4"></i><span class="text-sm font-medium">My Courses</span>
        </div>
        <div onclick="showPage('assessments', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-file-alt w-4"></i><span class="text-sm font-medium">Assessments</span>
        </div>
        <div onclick="showPage('grades', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-chart-bar w-4"></i><span class="text-sm font-medium">My Grades</span>
        </div>
        <div onclick="showPage('results', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-trophy w-4"></i><span class="text-sm font-medium">My Results</span>
        </div>
        <div onclick="showPage('gpa', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-chart-line w-4"></i><span class="text-sm font-medium">GPA & Performance</span>
        </div>
        <div onclick="showPage('settings', this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl text-white transition-all">
          <i class="fas fa-cog w-4"></i><span class="text-sm font-medium">Settings</span>
        </div>
      </nav>
    </div>

    <div class="p-4 border-t border-purple-800">
      <button onclick="logout()" class="w-full flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 py-3 rounded-2xl text-white text-sm font-medium transition-all">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="flex-1 overflow-auto">
   <header class="bg-white border-b px-4 md:px-8 py-4 flex items-center justify-between sticky top-0 z-10">
  <div class="flex items-center gap-3">
    <button onclick="toggleSidebar()"
      class="md:hidden w-9 h-9 flex items-center justify-center rounded-xl bg-gray-100 hover:bg-gray-200">
      <i class="fas fa-bars text-gray-600"></i>
    </button>
    <h1 id="pageTitle" class="text-xl md:text-2xl font-bold text-gray-900">Dashboard</h1>
  </div>
  <div class="flex items-center gap-2 md:gap-3">
    <div class="hidden md:flex items-center bg-green-100 text-green-700 px-4 py-2 rounded-full text-xs font-medium">
      <div class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></div>
      System Online
    </div>
    <div class="flex items-center gap-2">
      <div class="text-right hidden md:block">
        <p class="font-semibold text-gray-800 text-sm" id="headerName"></p>
        <p class="text-xs text-gray-500">Student</p>
      </div>
      <div class="w-9 h-9 bg-purple-100 text-purple-700 rounded-full flex items-center justify-center font-bold ring-2 ring-purple-300" id="headerAvatar">S</div>
    </div>
  </div>
</header>

    <div class="p-8" id="mainContent"></div>
  </div>
</div>

<script>
  function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  }

  // Close sidebar when nav item clicked on mobile
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        if (window.innerWidth < 768) {
          document.querySelector('.sidebar').classList.remove('open');
          document.getElementById('sidebarOverlay').classList.remove('show');
        }
      });
    });
  });
  let currentUser = {};
  let examTimer = null;
  let timeLeft = 0;
  let currentExamId = null;

  fetch('/auth/me').then(r => r.json()).then(data => {
    if (!data.fullName) { window.location.href = '/auth/login'; return; }
    currentUser = data;
    const initial = data.surname ? data.surname.charAt(0).toUpperCase() : data.fullName.charAt(0).toUpperCase();
    const displayName = data.surname ? `${data.surname.toUpperCase()} ${data.firstName}` : data.fullName;
    document.getElementById('studentName').textContent = displayName;
    document.getElementById('headerName').textContent = displayName;
    document.getElementById('sidebarAvatar').textContent = initial;
    // Load profile photo if exists
if (data.profilePhoto) {
  setAvatarPhoto(data.profilePhoto);
} else {
  document.getElementById('sidebarAvatar').textContent = initial;
}
    document.getElementById('headerAvatar').textContent = initial;
    if (data.matricNumber) {
      document.getElementById('sidebarMatric').style.display = 'block';
      document.getElementById('sidebarMatricText').textContent = data.matricNumber;
    }
    loadDashboard();
  }).catch(() => { window.location.href = '/auth/login'; });

  function showPage(page, el) {
    document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('pageTitle').textContent =
      page === 'dashboard' ? 'Dashboard' :
      page === 'courses' ? 'My Courses' :
      page === 'assessments' ? 'Assessments' :
      page === 'grades' ? 'My Grades' :
     page === 'results' ? 'My Results' :
      page === 'gpa' ? 'GPA & Performance' : 'Settings';
    if (examTimer) { clearInterval(examTimer); examTimer = null; }
    if (page === 'dashboard') loadDashboard();
    else if (page === 'courses') loadCourses();
    else if (page === 'assessments') loadAssessments();
    else if (page === 'grades') loadGrades();
    else if (page === 'results') loadResults();
    else if (page === 'gpa') loadGPA();
    else if (page === 'settings') loadSettings();
  }

  function getGreeting() {
    const h = new Date().getHours();
    return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  }

  function getFormattedDate() {
    return new Date().toLocaleDateString('en-GB', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  }

  function getCharacterSVG() {
    return `<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" width="260" height="200">
      <circle cx="100" cy="140" r="88" fill="rgba(255,255,255,0.05)"/>
      <circle cx="100" cy="140" r="65" fill="rgba(255,255,255,0.04)"/>
      <path d="M25 240 L25 185 Q25 168 55 162 L72 155 L100 168 L128 155 L145 162 Q175 168 175 185 L175 240 Z" fill="white"/>
      <path d="M72 155 Q100 175 128 155 Q114 158 100 162 Q86 158 72 155Z" fill="#e5e7eb"/>
      <path d="M25 185 Q18 175 20 162 L55 162 Q35 168 25 185Z" fill="#f3f4f6"/>
      <path d="M175 185 Q182 175 180 162 L145 162 Q165 168 175 185Z" fill="#f3f4f6"/>
      <line x1="100" y1="172" x2="97" y2="240" stroke="#e5e7eb" stroke-width="1.5"/>
      <line x1="100" y1="172" x2="103" y2="240" stroke="#e5e7eb" stroke-width="1.5"/>
      <text x="88" y="205" font-size="16" fill="#7c3aed" opacity="0.5">★</text>
      <rect x="85" y="148" width="30" height="20" rx="8" fill="#f59e0b"/>
      <ellipse cx="100" cy="108" rx="54" ry="56" fill="#f59e0b"/>
      <ellipse cx="85" cy="78" rx="18" ry="10" fill="rgba(255,255,255,0.18)" transform="rotate(-20,85,78)"/>
      <ellipse cx="48" cy="112" rx="10" ry="13" fill="#f59e0b"/>
      <ellipse cx="152" cy="112" rx="10" ry="13" fill="#f59e0b"/>
      <ellipse cx="48" cy="112" rx="6" ry="8" fill="#fbbf24"/>
      <ellipse cx="152" cy="112" rx="6" ry="8" fill="#fbbf24"/>
      <ellipse cx="82" cy="108" rx="11" ry="13" fill="white"/>
      <ellipse cx="118" cy="108" rx="11" ry="13" fill="white"/>
      <ellipse cx="82" cy="110" rx="7" ry="8" fill="#92400e"/>
      <ellipse cx="118" cy="110" rx="7" ry="8" fill="#92400e"/>
      <ellipse cx="82" cy="110" rx="4" ry="5" fill="#1c1917"/>
      <ellipse cx="118" cy="110" rx="4" ry="5" fill="#1c1917"/>
      <circle cx="84" cy="107" r="2.5" fill="white"/>
      <circle cx="120" cy="107" r="2.5" fill="white"/>
      <path d="M71 98 Q82 92 93 97" stroke="#1c1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M107 97 Q118 92 129 98" stroke="#1c1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M70 96 Q82 89 94 94" stroke="#92400e" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M106 94 Q118 89 130 96" stroke="#92400e" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="100" cy="122" rx="5" ry="4" fill="#e09b38" opacity="0.6"/>
      <circle cx="96.5" cy="123" r="2" fill="#c97d20" opacity="0.4"/>
      <circle cx="103.5" cy="123" r="2" fill="#c97d20" opacity="0.4"/>
      <path d="M80 136 Q100 152 120 136" stroke="#92400e" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M83 138 Q100 150 117 138 Q100 148 83 138Z" fill="white" opacity="0.85"/>
      <ellipse cx="66" cy="126" rx="12" ry="8" fill="#fca5a5" opacity="0.4"/>
      <ellipse cx="134" cy="126" rx="12" ry="8" fill="#fca5a5" opacity="0.4"/>
      <rect x="58" y="62" width="84" height="12" rx="4" fill="#4c1d95"/>
      <polygon points="100,40 158,64 100,76 42,64" fill="#6d28d9"/>
      <circle cx="100" cy="40" r="7" fill="#4c1d95"/>
      <line x1="158" y1="64" x2="163" y2="90" stroke="#e879f9" stroke-width="2.5"/>
      <circle cx="163" cy="93" r="5" fill="#e879f9"/>
      <line x1="163" y1="93" x2="159" y2="110" stroke="#e879f9" stroke-width="1.5"/>
      <line x1="163" y1="93" x2="166" y2="110" stroke="#e879f9" stroke-width="1.5"/>
      <text x="5" y="85" font-size="18" opacity="0.9">✨</text>
      <text x="168" y="65" font-size="14" opacity="0.8">⭐</text>
      <text x="174" y="115" font-size="13" opacity="0.7">✨</text>
      <text x="10" y="150" font-size="11" opacity="0.6">⭐</text>
    </svg>`;
  }

  function loadDashboard() {
    const firstName = currentUser.fullName ? currentUser.fullName.split(' ')[0] : 'Student';
    document.getElementById('mainContent').innerHTML = `

      <!-- ── WELCOME BANNER ── -->
      <div class="welcome-card mb-8" style="min-height:200px;">

        <!-- Decorative background circles -->
        <div style="position:absolute;top:-40px;left:300px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.04);pointer-events:none;"></div>
        <div style="position:absolute;bottom:-50px;left:420px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.04);pointer-events:none;"></div>
        <div style="position:absolute;top:10px;right:280px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.03);pointer-events:none;"></div>

        <div class="flex items-stretch justify-between p-8">

          <!-- LEFT: Text -->
          <div class="flex-1 z-10 relative" style="max-width:60%;">
            <p class="text-purple-300 text-xs mb-3 font-medium">${getFormattedDate()}</p>
            <div class="flex items-center gap-2 mb-3">
            </div>
            <p class="text-purple-200 text-sm mb-1">${getGreeting()},</p>
            <h2 class="text-3xl font-bold text-white mb-2">Welcome back, ${firstName}! </h2>
            <p class="text-purple-200 text-sm mb-2">Always stay updated on your student portal</p>
            ${currentUser.lastLogin ? `
            <p class="text-purple-300 text-xs mb-6">
              <i class="fas fa-clock mr-1"></i>
              Last login: ${new Date(currentUser.lastLogin).toLocaleString('en-GB', {
                weekday: 'short', year: 'numeric', month: 'short',
                day: 'numeric', hour: '2-digit', minute: '2-digit'
              })}
            </p>` : '<p class="mb-6"></p>'}
          </div>

          <!-- RIGHT: Character -->
          <div class="floating z-10 flex items-end justify-end"
            style="position:absolute; right:24px; bottom:0;">
            ${getCharacterSVG()}
          </div>

        </div>
      </div>

      <!-- Stats Row -->
<div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
  <div class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 hover:border-purple-200 hover:shadow-md transition-all">
    <div class="w-14 h-14 bg-purple-100 rounded-2xl flex items-center justify-center mb-5">
      <i class="fas fa-book text-purple-600 text-2xl"></i>
    </div>
    <p id="statCourses" class="text-5xl font-bold text-gray-900 mb-1">—</p>
    <p class="text-sm text-gray-500 font-medium">Enrolled Courses</p>
    <div class="mt-4 h-1 w-12 bg-purple-200 rounded-full"></div>
  </div>
  <div class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 hover:border-yellow-200 hover:shadow-md transition-all">
    <div class="w-14 h-14 bg-yellow-100 rounded-2xl flex items-center justify-center mb-5">
      <i class="fas fa-clock text-yellow-600 text-2xl"></i>
    </div>
    <p id="statAssessments" class="text-5xl font-bold text-gray-900 mb-1">—</p>
    <p class="text-sm text-gray-500 font-medium">Pending Assessments</p>
    <div class="mt-4 h-1 w-12 bg-yellow-200 rounded-full"></div>
  </div>
  <div class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 hover:border-green-200 hover:shadow-md transition-all">
    <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center mb-5">
      <i class="fas fa-check-circle text-green-600 text-2xl"></i>
    </div>
    <p id="statSubmitted" class="text-5xl font-bold text-gray-900 mb-1">—</p>
    <p class="text-sm text-gray-500 font-medium">Submitted</p>
    <div class="mt-4 h-1 w-12 bg-green-200 rounded-full"></div>
  </div>
  <div class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 hover:border-pink-200 hover:shadow-md transition-all">
    <div class="w-14 h-14 bg-pink-100 rounded-2xl flex items-center justify-center mb-5">
      <i class="fas fa-star text-pink-600 text-2xl"></i>
    </div>
    <p id="statAverage" class="text-5xl font-bold text-gray-900 mb-1">—</p>
    <p class="text-sm text-gray-500 font-medium">Average Score</p>
    <div class="mt-4 h-1 w-12 bg-pink-200 rounded-full"></div>
  </div>
</div>

     <!-- Bottom Row -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold text-gray-900 mb-4">Available Assessments</h2>
          <div id="dashAssessments" class="space-y-3"><div class="text-gray-400 text-sm">Loading...</div></div>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold text-gray-900 mb-4">Recent Grades</h2>
          <div id="dashGrades" class="space-y-3"><div class="text-gray-400 text-sm">Loading...</div></div>
        </div>
      </div>

      <!-- Charts Row -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold text-gray-900 mb-4">📊 My Score History</h2>
          <canvas id="scoresChart" height="200"></canvas>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold text-gray-900 mb-4">🎯 Grade Distribution</h2>
          <canvas id="gradeChart" height="200"></canvas>
        </div>
      </div>`;

    fetch('/student/stats').then(r => r.json()).then(data => {
      document.getElementById('statCourses').textContent    = data.totalCourses || 0;
      document.getElementById('statAssessments').textContent = data.totalAssessments || 0;
      document.getElementById('statSubmitted').textContent  = data.totalSubmitted || 0;
      document.getElementById('statAverage').textContent    = data.averageScore ? data.averageScore + '%' : '—';
      
      const assessDiv = document.getElementById('dashAssessments');
      if (data.assessments && data.assessments.length > 0) {
        assessDiv.innerHTML = data.assessments.slice(0, 3).map(a => `
          <div class="flex items-center justify-between p-4 bg-gray-50 hover:bg-purple-50 rounded-xl transition-all cursor-pointer">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded-xl flex items-center justify-center text-sm
                ${a.type==='objective'?'bg-pink-100':a.type==='theory'?'bg-blue-100':'bg-green-100'}">
                ${a.type==='objective'?'🎯':a.type==='theory'?'📝':'💻'}
              </div>
              <div>
                <p class="text-sm font-semibold text-gray-800">${a.title}</p>
                <p class="text-xs text-gray-400">${a.course_code} • ${a.duration_minutes} mins</p>
              </div>
            </div>
            <button onclick="startExam(${a.assessment_id})"
              class="text-xs bg-purple-700 text-white px-3 py-1.5 rounded-xl font-semibold hover:bg-purple-800">Start</button>
          </div>`).join('');
      } else {
        assessDiv.innerHTML = '<p class="text-gray-400 text-sm">No assessments available.</p>';
      }

      const gradesDiv = document.getElementById('dashGrades');
      if (data.grades && data.grades.length > 0) {
        gradesDiv.innerHTML = data.grades.slice(0, 3).map(g => {
          const pct = Math.round((g.total_score / g.total_marks) * 100);
          return `
          <div class="p-4 bg-gray-50 rounded-xl">
            <div class="flex items-center justify-between mb-2">
              <p class="text-sm font-semibold text-gray-800">${g.assessment_title}</p>
              <span class="font-bold text-lg ${pct>=70?'text-green-600':pct>=50?'text-yellow-600':'text-red-500'}">${pct}%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
              <div class="progress-bar h-2 rounded-full ${pct>=70?'bg-green-500':pct>=50?'bg-yellow-500':'bg-red-500'}" style="width:${pct}%"></div>
            </div>
            <p class="text-xs text-gray-400 mt-1">${g.total_score}/${g.total_marks} marks</p>
          </div>`;
        }).join('');
      } else {
        gradesDiv.innerHTML = '<p class="text-gray-400 text-sm">No grades yet.</p>';
      }
    }).catch(() => {});
  }

  // Draw Charts
      setTimeout(() => {
        // Score History Chart
        const scoreCtx = document.getElementById('scoresChart');

  function startTimer() {
    // Prevent going back during exam
    history.pushState(null, null, location.href);
    window.onpopstate = function() {
      if (examTimer) {
        history.pushState(null, null, location.href);
        showToast('You cannot go back during an exam!', 'warning');
      }
    };

    updateTimerDisplay();
    examTimer = setInterval(() => {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) {
        clearInterval(examTimer);
        alert(' Time is up! Submitting your exam...', 'warning', 3000);
        setTimeout(() => submitExam(currentExamId), 1500);
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const el = document.getElementById('timerDisplay');
    const timerBox = document.getElementById('timerBox');
    if (!el) return;
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    el.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

    if (timeLeft === 300) {
      // 5 minutes warning
      showWarningPopup('⚠️ 5 Minutes Left!', 'You have 5 minutes remaining. Start wrapping up your answers!', 'warning');
    } else if (timeLeft === 60) {
      // 1 minute warning
      showWarningPopup('🚨 1 Minute Left!', 'Only 1 minute remaining! Your exam will auto-submit soon.', 'danger');
    }

    if (timeLeft <= 60) {
      el.classList.add('timer-danger');
      el.style.color = '#ef4444';
      if (timerBox) timerBox.style.borderColor = '#fca5a5';
      if (timerBox) timerBox.style.background = '#fef2f2';
    } else if (timeLeft <= 300) {
      el.style.color = '#f59e0b';
      if (timerBox) timerBox.style.borderColor = '#fcd34d';
      if (timerBox) timerBox.style.background = '#fffbeb';
    }
  }

  function showWarningPopup(title, message, type) {
    const existing = document.getElementById('warningPopup');
    if (existing) existing.remove();

    const bgColor = type === 'danger' ? '#fef2f2' : '#fffbeb';
    const borderColor = type === 'danger' ? '#fca5a5' : '#fcd34d';
    const iconColor = type === 'danger' ? '#dc2626' : '#d97706';
    const icon = type === 'danger' ? '🚨' : '⚠️';

    const popup = document.createElement('div');
    popup.id = 'warningPopup';
    popup.style.cssText = `
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
    `;
    popup.innerHTML = `
      <div style="background:${bgColor}; border: 2px solid ${borderColor};
        border-radius: 24px; padding: 40px; text-align: center;
        max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        animation: popIn 0.3s ease;">
        <div style="font-size:52px; margin-bottom:16px;">${icon}</div>
        <h2 style="font-size:24px; font-weight:800; color:${iconColor}; margin-bottom:8px;">${title}</h2>
        <p style="color:#6b7280; font-size:15px; line-height:1.6; margin-bottom:24px;">${message}</p>
        <button onclick="document.getElementById('warningPopup').remove()"
          style="background:${iconColor}; color:white; border:none; padding:12px 32px;
          border-radius:50px; font-size:15px; font-weight:600; cursor:pointer;">
          OK, Got it!
        </button>
      </div>`;

    if (!document.getElementById('popInStyle')) {
      const style = document.createElement('style');
      style.id = 'popInStyle';
      style.textContent = `@keyframes popIn { from{opacity:0;transform:scale(0.8);} to{opacity:1;transform:scale(1);} }`;
      document.head.appendChild(style);
    }

    document.body.appendChild(popup);
    setTimeout(() => { if (document.getElementById('warningPopup')) document.getElementById('warningPopup').remove(); }, 5000);
  }

  function submitExam(assessmentId) {
    if (examTimer) { clearInterval(examTimer); examTimer = null; }
    const answers = [];
    document.querySelectorAll('[name^="q"]').forEach(input => {
      if (input.type === 'radio' && !input.checked) return;
      const qId = input.name.replace('q', '');
      const existing = answers.find(a => a.question_id == qId);
      if (!existing) answers.push({ question_id: qId, answer_text: input.value });
    });
    document.querySelectorAll('textarea[name^="q"]').forEach(ta => {
      const qId = ta.name.replace('q', '');
      answers.push({ question_id: qId, answer_text: ta.value });
    });

    document.getElementById('mainContent').innerHTML = `
      <div class="text-center py-20">
        <div class="w-16 h-16 border-4 border-purple-700 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <p class="text-gray-500">Submitting and grading your exam...</p>
      </div>`;

    fetch(`/student/assessments/${assessmentId}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers })
    }).then(r => r.json()).then(data => {
      if (data.success) {
        document.getElementById('mainContent').innerHTML = `

function downloadResultPDF() {

        return;

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      // Colors
      const purple = [88, 28, 135];
      const lightPurple = [243, 232, 255];
      const dark = [31, 41, 55];
      const gray = [107, 114, 128];

      // Header background
      doc.setFillColor(...purple);
      doc.rect(0, 0, 210, 45, 'F');

      // Logo & Title
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(24);
      doc.setFont('helvetica', 'bold');
      doc.text('AGLAS', 14, 18);

      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text('Automatic Grading & Learning Assessment System', 14, 26);
      doc.text('Federal University of Lafia — Department of Computer Science', 14, 33);

      // Result Slip title
      doc.setFontSize(13);
      doc.setFont('helvetica', 'bold');
      doc.text('STUDENT RESULT SLIP', 14, 42);

      // Student Info Box
      doc.setFillColor(...lightPurple);
      doc.rect(14, 52, 182, 28, 'F');

      doc.setTextColor(...dark);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.text('Student Name:', 18, 61);
      doc.text('Date Generated:', 18, 69);
      doc.text('Total Assessments:', 110, 61);
      doc.text('Average Score:', 110, 69);

      // Calculate stats
      const total = data.results.length;
      const avg = Math.round(data.results.reduce((sum, r) =>
        sum + Math.round((r.total_score / r.total_marks) * 100), 0) / total);
      const best = Math.max(...data.results.map(r =>
        Math.round((r.total_score / r.total_marks) * 100)));

      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...purple);
      doc.text(currentUser.fullName || 'Student', 55, 61);
      doc.text(new Date().toLocaleDateString('en-GB', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      }), 55, 69);
      doc.text(total.toString(), 160, 61);
      doc.text(avg + '%', 160, 69);

      // Table Header
      let y = 90;
      doc.setFillColor(...purple);
      doc.rect(14, y - 6, 182, 10, 'F');

      doc.setTextColor(255, 255, 255);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.text('Assessment', 18, y);
      doc.text('Course', 85, y);
      doc.text('Score', 120, y);
      doc.text('%', 145, y);
      doc.text('Grade', 163, y);
      doc.text('Date', 178, y);

      // Table rows
      y += 8;
      data.results.forEach((r, i) => {
        const pct = Math.round((r.total_score / r.total_marks) * 100);
        const grade = pct >= 70 ? 'A' : pct >= 60 ? 'B' : pct >= 50 ? 'C' : pct >= 45 ? 'D' : 'F';

        // Alternate row colors
        if (i % 2 === 0) {
          doc.setFillColor(249, 250, 251);
          doc.rect(14, y - 5, 182, 9, 'F');
        }

        doc.setTextColor(...dark);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8.5);

        const title = r.assessment_title.length > 28 ? r.assessment_title.substring(0, 28) + '...' : r.assessment_title;
        doc.text(title, 18, y);
        doc.text(r.course_code || '—', 85, y);
        doc.text(`${r.total_score}/${r.total_marks}`, 120, y);
        doc.text(pct + '%', 145, y);

        // Grade with color
        if (pct >= 70) doc.setTextColor(22, 163, 74);
        else if (pct >= 50) doc.setTextColor(217, 119, 6);
        else doc.setTextColor(220, 38, 38);

        doc.setFont('helvetica', 'bold');
        doc.text(grade, 165, y);

        doc.setTextColor(...gray);
        doc.setFont('helvetica', 'normal');
        doc.text(new Date(r.submitted_at).toLocaleDateString('en-GB'), 175, y);

        y += 10;

        // New page if needed
        if (y > 270) {
          doc.addPage();
          y = 20;
        }
      });

      // Summary Box
      y += 8;
      doc.setFillColor(...purple);
      doc.rect(14, y, 182, 28, 'F');

      doc.setTextColor(255, 255, 255);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.text('PERFORMANCE SUMMARY', 18, y + 8);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.text(`Total Assessments: ${total}`, 18, y + 17);
      doc.text(`Average Score: ${avg}%`, 80, y + 17);
      doc.text(`Best Score: ${best}%`, 145, y + 17);

      // Remark
      const remark = avg >= 70 ? 'Excellent Performance! 🌟' : avg >= 50 ? 'Good Performance 👍' : 'Needs Improvement 💪';
      doc.text(`Remark: ${remark}`, 18, y + 25);

      // Footer
      doc.setFillColor(243, 232, 255);
      doc.rect(0, 285, 210, 12, 'F');
      doc.setTextColor(...gray);
      doc.setFontSize(8);
      doc.text('Generated by AGLAS — Automatic Grading & Learning Assessment System', 14, 292);
      doc.text(`© ${new Date().getFullYear()} Federal University of Lafia`, 155, 292);

      // Save
      const filename = `AGLAS_Result_${(currentUser.fullName || 'Student').replace(/ /g, '_')}_${new Date().toLocaleDateString('en-GB').replace(/\//g, '-')}.pdf`;
      doc.save(filename);
      showToast('Result slip downloaded successfully! 📄', 'success');

    }).catch(() => {
      showToast('Failed to generate PDF.', 'error');
    });
  }

      </div>`;

    fetch('/auth/me').then(r => r.json()).then(data => {
      document.getElementById('updateName').value  = data.fullName || '';
      document.getElementById('updateEmail').value = data.email || '';
      setAvatarPhoto(data.profilePhoto);
    });
  }

  function updateProfile() {
    const name  = document.getElementById('updateName').value;
    const email = document.getElementById('updateEmail').value;
    const msg   = document.getElementById('profileMsg');
    if (!name || !email) {
      msg.textContent = 'Name and email are required.';
      msg.className = 'text-sm font-medium text-red-600';
      msg.classList.remove('hidden'); return;
    }
    fetch('/student/settings/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fullName: name, email })
    }).then(r => r.json()).then(data => {
      if (data.success) {
        msg.textContent = '✅ Profile updated!';
        msg.className = 'text-sm font-medium text-green-600';
        msg.classList.remove('hidden');
        document.getElementById('studentName').textContent = name;
        document.getElementById('headerName').textContent  = name;
      } else {
        msg.textContent = data.message || 'Failed.';
        msg.className = 'text-sm font-medium text-red-600';
        msg.classList.remove('hidden');
      }
    });
  }

  function updatePassword() {
    const current = document.getElementById('currentPassword').value;
    const newPass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmNewPassword').value;
    const msg     = document.getElementById('passwordMsg');
    if (!current || !newPass || !confirm) {
      msg.textContent = 'All fields are required.';
      msg.className = 'text-sm font-medium text-red-600';
      msg.classList.remove('hidden'); return;
    }
    if (newPass !== confirm) {
      msg.textContent = 'Passwords do not match.';
      msg.className = 'text-sm font-medium text-red-600';
      msg.classList.remove('hidden'); return;
    }
    fetch('/student/settings/password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword: current, newPassword: newPass })
    }).then(r => r.json()).then(data => {
      if (data.success) {
        msg.textContent = '✅ Password updated!';
        msg.className = 'text-sm font-medium text-green-600';
        msg.classList.remove('hidden');
      } else {
        msg.textContent = data.message || 'Failed.';
        msg.className = 'text-sm font-medium text-red-600';
        msg.classList.remove('hidden');
      }
    });
  }

  function logout() {
    if (confirm('Logout?')) window.location.href = '/auth/logout';
  }

// Upload profile photo
function uploadPhoto(input) {
  const file = input.files[0];
  if (!file) return;

  if (file.size > 2 * 1024 * 1024) {
    alert('Photo must be under 2MB.', 'error');
    return;
  }

  const formData = new FormData();
  formData.append('photo', file);

  alert('Uploading photo...', 'info', 2000);

  fetch('/auth/upload-photo', {
    method: 'POST',
    body: formData
  }).then(r => r.json()).then(data => {
    if (data.success) {
      setAvatarPhoto(data.photoPath);
      alert('Profile photo updated! ✅', 'success');
    } else {
      alert(data.message || 'Upload failed.', 'error');
    }
  }).catch(() => {
    alert('Server error. Please try again.', 'error');
  });
}

// Set avatar to photo or initial letter
function setAvatarPhoto(photoPath) {
  const avatar = document.getElementById('sidebarAvatar');
  if (photoPath) {
    avatar.innerHTML = `<img src="${photoPath}" alt="Profile" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  }
}
</script>
