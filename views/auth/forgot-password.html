<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGLAS • Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #581c87 0%, #3b0764 60%, #1e0336 100%); }
    .input-field:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #581c87); }
    .btn-primary:hover { background: linear-gradient(135deg, #6d28d9, #4c1d95); }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-10">

    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-purple-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-key text-purple-600 text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-900">Forgot Password?</h2>
      <p class="text-gray-500 text-sm mt-2">Enter your email and we'll send you a reset link</p>
    </div>

    <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-2xl px-5 py-4 mb-6 flex items-center gap-3">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">An error occurred.</span>
    </div>

    <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-600 rounded-2xl px-5 py-4 mb-6 flex items-center gap-3">
      <i class="fas fa-check-circle"></i>
      <span id="successText">Reset link sent!</span>
    </div>

    <form onsubmit="handleForgot(event)" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
        <div class="relative">
          <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="email" id="email" placeholder="your@gmail.com"
            class="input-field w-full pl-11 pr-4 py-4 border-2 border-gray-200 rounded-2xl text-gray-800 transition-all"
            required />
        </div>
      </div>

      <button type="submit" id="submitBtn"
        class="btn-primary w-full py-4 rounded-2xl text-white font-semibold text-lg transition-all flex items-center justify-center gap-3">
        <span id="btnText">Send Reset Link</span>
        <i id="btnIcon" class="fas fa-paper-plane"></i>
      </button>
    </form>

    <div class="mt-6 text-center">
      <a href="/auth/login" class="text-purple-700 font-semibold text-sm hover:underline">
        <i class="fas fa-arrow-left mr-1"></i> Back to Login
      </a>
    </div>
  </div>

  <script>
    async function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnIcon = document.getElementById('btnIcon');

      document.getElementById('errorMsg').classList.add('hidden');
      document.getElementById('successMsg').classList.add('hidden');

      btn.disabled = true;
      btnText.textContent = 'Sending...';
      btnIcon.className = 'fas fa-spinner fa-spin';

      try {
        const res = await fetch('/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('successText').textContent = data.message;
          document.getElementById('successMsg').classList.remove('hidden');
          btnText.textContent = 'Sent!';
          btnIcon.className = 'fas fa-check';
        } else {
          document.getElementById('errorText').textContent = data.message;
          document.getElementById('errorMsg').classList.remove('hidden');
          btn.disabled = false;
          btnText.textContent = 'Send Reset Link';
          btnIcon.className = 'fas fa-paper-plane';
        }
      } catch (err) {
        document.getElementById('errorText').textContent = 'Server error. Please try again.';
        document.getElementById('errorMsg').classList.remove('hidden');
        btn.disabled = false;
        btnText.textContent = 'Send Reset Link';
        btnIcon.className = 'fas fa-paper-plane';
      }
    }
  </script>
</body>
</html>
