<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGLAS • Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #581c87 0%, #3b0764 60%, #1e0336 100%); }
    .input-field:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #581c87); }
    .btn-primary:hover { background: linear-gradient(135deg, #6d28d9, #4c1d95); }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-10">

    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-purple-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-lock text-purple-600 text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-900">Reset Password</h2>
      <p class="text-gray-500 text-sm mt-2">Enter your new password below</p>
    </div>

    <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-2xl px-5 py-4 mb-6 flex items-center gap-3">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">An error occurred.</span>
    </div>

    <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-600 rounded-2xl px-5 py-4 mb-6 flex items-center gap-3">
      <i class="fas fa-check-circle"></i>
      <span>Password reset successfully! Redirecting to login...</span>
    </div>

    <form onsubmit="handleReset(event)" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">New Password</label>
        <div class="relative">
          <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="password" id="newPassword" placeholder="Min. 8 characters"
            class="input-field w-full pl-11 pr-12 py-4 border-2 border-gray-200 rounded-2xl text-gray-800 transition-all"
            required minlength="8"/>
          <button type="button" onclick="togglePass()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-purple-600">
            <i id="eyeIcon" class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm New Password</label>
        <div class="relative">
          <i class="fas fa-check-circle absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="password" id="confirmPassword" placeholder="Re-enter new password"
            class="input-field w-full pl-11 pr-4 py-4 border-2 border-gray-200 rounded-2xl text-gray-800 transition-all"
            required />
        </div>
      </div>

      <button type="submit" id="submitBtn"
        class="btn-primary w-full py-4 rounded-2xl text-white font-semibold text-lg transition-all flex items-center justify-center gap-3">
        <span id="btnText">Reset Password</span>
        <i id="btnIcon" class="fas fa-arrow-right"></i>
      </button>
    </form>
  </div>

  <script>
    function togglePass() {
      const input = document.getElementById('newPassword');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    // Get token from URL
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) window.location.href = '/auth/login';

    async function handleReset(e) {
      e.preventDefault();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnIcon = document.getElementById('btnIcon');

      document.getElementById('errorMsg').classList.add('hidden');

      if (newPassword !== confirmPassword) {
        document.getElementById('errorText').textContent = 'Passwords do not match.';
        document.getElementById('errorMsg').classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'Resetting...';
      btnIcon.className = 'fas fa-spinner fa-spin';

      try {
        const res = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('successMsg').classList.remove('hidden');
          btnText.textContent = 'Done!';
          btnIcon.className = 'fas fa-check';
          setTimeout(() => { window.location.href = '/auth/login'; }, 2000);
        } else {
          document.getElementById('errorText').textContent = data.message;
          document.getElementById('errorMsg').classList.remove('hidden');
          btn.disabled = false;
          btnText.textContent = 'Reset Password';
          btnIcon.className = 'fas fa-arrow-right';
        }
      } catch (err) {
        document.getElementById('errorText').textContent = 'Server error. Please try again.';
        document.getElementById('errorMsg').classList.remove('hidden');
        btn.disabled = false;
        btnText.textContent = 'Reset Password';
        btnIcon.className = 'fas fa-arrow-right';
      }
    }
  </script>
</body>
</html>
