<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGLAS - Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a0a35 0%, #3b0764 50%, #1a0a35 100%); min-height: 100vh; }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-purple-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-lock text-purple-700 text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Reset Password</h1>
      <p class="text-sm text-gray-500 mt-2">Enter your new password below.</p>
    </div>

    <div id="formArea">
      <input type="password" id="newPassword" placeholder="New password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none mb-4"/>
      <input type="password" id="confirmPassword" placeholder="Confirm new password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-purple-500 outline-none mb-4"/>
      <div id="msg" class="hidden text-sm font-medium mb-4 text-center"></div>
      <button onclick="submitReset()" class="w-full bg-purple-700 hover:bg-purple-800 text-white py-3 rounded-xl text-sm font-bold transition-all">
        Reset Password
      </button>
    </div>

    <div class="text-center mt-6">
      <a href="/auth/login" class="text-sm text-purple-600 hover:text-purple-800 font-medium"><i class="fas fa-arrow-left mr-1"></i>Back to Login</a>
    </div>
  </div>

<script>
  function getToken() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token');
  }

  function submitReset() {
    const token = getToken();
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const msg = document.getElementById('msg');

    if (!token) { msg.textContent = 'Invalid or missing reset token.'; msg.className = 'text-sm font-medium mb-4 text-center text-red-600'; msg.classList.remove('hidden'); return; }
    if (!newPassword || !confirmPassword) { msg.textContent = 'All fields are required.'; msg.className = 'text-sm font-medium mb-4 text-center text-red-600'; msg.classList.remove('hidden'); return; }
    if (newPassword !== confirmPassword) { msg.textContent = 'Passwords do not match.'; msg.className = 'text-sm font-medium mb-4 text-center text-red-600'; msg.classList.remove('hidden'); return; }

    fetch('/auth/reset-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, newPassword}) })
      .then(r => r.json()).then(data => {
        msg.textContent = data.message;
        msg.className = 'text-sm font-medium mb-4 text-center ' + (data.success ? 'text-green-600' : 'text-red-600');
        msg.classList.remove('hidden');
        if (data.success) {
          document.getElementById('formArea').innerHTML = '<div class="text-center py-4"><i class="fas fa-circle-check text-4xl text-green-500 mb-3"></i><p class="text-gray-700 font-medium">Password reset successfully.</p><a href="/auth/login" class="inline-block mt-4 bg-purple-700 hover:bg-purple-800 text-white px-6 py-2 rounded-xl text-sm font-bold transition-all">Go to Login</a></div>';
        }
      }).catch(() => { msg.textContent = 'Server error. Please try again.'; msg.className = 'text-sm font-medium mb-4 text-center text-red-600'; msg.classList.remove('hidden'); });
  }
</script>
</body>
</html>
